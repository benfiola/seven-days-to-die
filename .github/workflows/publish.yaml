name: Manual Trigger Workflow with Inputs

on:
  workflow_dispatch:
    inputs:
      manifest_id:
        description: "Manifest ID to build"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      image_base: benfiola/seven-days-to-die
    environment:
      name: publish
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: calculate facts
        id: facts
        run: |
          docker_tag="${{github.event.inputs.manifest_id}}-testing"
          docker_image="docker.io/${{env.image_base}}:${docker_tag}"

          echo "docker_image=${docker_image}" >> "${GITHUB_OUTPUT}"
      - name: docker login
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: benfiola
          password: ${{secrets.DOCKER_TOKEN}}
      - name: docker build + push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{steps.facts.outputs.docker_image}}
